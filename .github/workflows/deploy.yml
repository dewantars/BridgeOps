name: CI/CD Pipeline — BridgeOps AI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

# Semua kredensial sensitif diambil dari GitHub Secrets.
# TIDAK ADA hardcoded credentials di dalam workflow ini.

jobs:
  # ════════════════════════════════════════════════════════════════
  # JOB 1: SECRET SCANNING
  # Mendeteksi kebocoran credentials/API Key di dalam kode sumber.
  # ════════════════════════════════════════════════════════════════
  secret-scan:
    name: 🔐 Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history needed for Gitleaks

      - name: Run Gitleaks — Detect Hardcoded Secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for .env files accidentally committed
        run: |
          echo "Checking for accidentally committed .env files..."
          if git ls-files | grep -E '^\.(env|env\.(local|production|staging|testing))$'; then
            echo "❌ ERROR: .env file found in git tracking! Remove it immediately."
            exit 1
          fi
          echo "✅ No .env files found in git."

      - name: Check for k8s laravel-secret.yaml with real credentials
        run: |
          echo "Checking k8s/laravel-secret.yaml for hardcoded credentials..."
          if [ -f "k8s/laravel-secret.yaml" ]; then
            # Fail if any value is not empty (non-empty base64 means real data)
            if grep -E '^\s+(APP_KEY|DB_PASSWORD|GEMINI_API_KEY|GITHUB_WEBHOOK_SECRET):\s+"[^"]' k8s/laravel-secret.yaml; then
              echo "❌ ERROR: k8s/laravel-secret.yaml contains real credentials! Use GitHub Secrets instead."
              exit 1
            fi
          fi
          echo "✅ k8s/laravel-secret.yaml check passed."

  # ════════════════════════════════════════════════════════════════
  # JOB 2: DEPENDENCY SECURITY AUDIT
  # Memeriksa vulnerabilities di dependensi PHP (Composer) dan JS (NPM).
  # ════════════════════════════════════════════════════════════════
  dependency-audit:
    name: 🔍 Dependency Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2

      - name: Install Composer Dependencies
        run: composer install --no-interaction --prefer-dist --no-scripts

      - name: Run Composer Audit (PHP Vulnerability Check)
        run: composer audit --no-interaction
        continue-on-error: false

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install NPM Dependencies
        run: npm ci

      - name: Run NPM Audit (JS Vulnerability Check)
        run: npm audit --audit-level=moderate
        continue-on-error: true  # Warn on NPM issues but don't block deploy

  # ════════════════════════════════════════════════════════════════
  # JOB 3: AUTOMATED TESTS WITH COVERAGE
  # Menjalankan PHPUnit test suite lengkap dengan code coverage report.
  # ════════════════════════════════════════════════════════════════
  test:
    name: 🧪 PHPUnit Tests + Coverage
    runs-on: ubuntu-latest
    needs: [ secret-scan ]  # Only run tests if secret scan passes

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB:       bridgeops_test
          POSTGRES_USER:     bridgeops_user
          POSTGRES_PASSWORD: ${{ secrets.TEST_DB_PASSWORD }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up PHP 8.2 with PCOV (for coverage)
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo_pgsql, pgsql, zip, pcov
          coverage: pcov
          tools: composer:v2

      - name: Install Composer Dependencies
        run: composer install --no-interaction --prefer-dist --no-scripts

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install NPM Dependencies & Build Assets
        run: |
          npm ci
          npm run build

      - name: Prepare Laravel Environment
        run: |
          cp .env.example .env
          php artisan key:generate
        env:
          APP_ENV: testing

      - name: Run PHPUnit Tests with Coverage (SQLite in-memory)
        run: |
          php artisan test \
            --coverage-clover coverage/clover.xml \
            --coverage-html coverage/html \
            --min=70
        env:
          APP_ENV:              testing
          APP_KEY:              ${{ secrets.TEST_APP_KEY }}
          DB_CONNECTION:        sqlite
          DB_DATABASE:          ":memory:"
          QUEUE_CONNECTION:     sync
          CACHE_STORE:          array
          SESSION_DRIVER:       array
          GEMINI_API_KEY:       ""
          GITHUB_WEBHOOK_SECRET: ${{ secrets.TEST_GITHUB_WEBHOOK_SECRET }}

      - name: Upload Coverage Report (HTML) as Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report-html
          path: coverage/html/
          retention-days: 14

      - name: Upload Coverage to Codecov (Optional)
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: coverage/clover.xml
          flags: unittests
          fail_ci_if_error: false
        continue-on-error: true

  # ════════════════════════════════════════════════════════════════
  # JOB 4: BUILD & PUSH DOCKER IMAGE
  # Hanya dijalankan pada push ke main/master setelah semua job lulus.
  # ════════════════════════════════════════════════════════════════
  build-and-push:
    name: 🐳 Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [ secret-scan, dependency-audit, test ]
    if: github.event_name == 'push'  # Only deploy on push, not on PRs

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up QEMU (for multi-platform builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Get short Git SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/bridgeops-app:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/bridgeops-app:${{ steps.vars.outputs.sha_short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ════════════════════════════════════════════════════════════════
  # JOB 5: GENERATE KUBERNETES SECRET FROM GITHUB SECRETS
  # Membuat k8s/laravel-secret.yaml dari GitHub Secrets lalu deploy.
  # Hanya dijalankan pada push ke main/master setelah image berhasil di-push.
  # ════════════════════════════════════════════════════════════════
  deploy-k8s-secret:
    name: 🔑 Generate K8s Secret from GitHub Secrets
    runs-on: ubuntu-latest
    needs: [ build-and-push ]
    if: github.event_name == 'push'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Generate laravel-secret.yaml from GitHub Secrets
        run: |
          # Encode each secret to base64 safely (no hardcoded values here!)
          APP_KEY_B64=$(echo -n "${{ secrets.APP_KEY }}" | base64 -w 0)
          DB_PASS_B64=$(echo -n "${{ secrets.DB_PASSWORD }}" | base64 -w 0)
          GEMINI_B64=$(echo -n "${{ secrets.GEMINI_API_KEY }}" | base64 -w 0)
          WEBHOOK_B64=$(echo -n "${{ secrets.GITHUB_WEBHOOK_SECRET }}" | base64 -w 0)

          cat > k8s/laravel-secret.yaml <<EOF
          apiVersion: v1
          kind: Secret
          metadata:
            name: laravel-secret
            labels:
              app: bridgeops
          type: Opaque
          data:
            APP_KEY: ${APP_KEY_B64}
            DB_PASSWORD: ${DB_PASS_B64}
            GEMINI_API_KEY: ${GEMINI_B64}
            GITHUB_WEBHOOK_SECRET: ${WEBHOOK_B64}
          EOF
          echo "✅ laravel-secret.yaml generated from GitHub Secrets (NOT committed to repo)."

      - name: Verify no plain-text secrets leaked into generated file
        run: |
          echo "Sanity check: ensuring raw secret values are not present in the file..."
          if grep -qF "${{ secrets.APP_KEY }}" k8s/laravel-secret.yaml 2>/dev/null; then
            echo "❌ Raw APP_KEY found in secret file!"
            exit 1
          fi
          echo "✅ Sanity check passed. File only contains base64 encoded values."

      - name: Upload generated secret manifest as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: k8s-laravel-secret
          path: k8s/laravel-secret.yaml
          retention-days: 1  # Short retention — sensitive file
