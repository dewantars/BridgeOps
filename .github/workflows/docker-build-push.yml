name: Container Scan and Push

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-scan-push:
    name: Build, Scan, and Push Container Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build image for scanning
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/bridgeops-ai:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan container image
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/bridgeops-ai:${{ github.sha }}
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

      - name: Push image to Docker Hub
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/bridgeops-ai:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/bridgeops-ai:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
