name: Application Security Gateway

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  security-gate:
    name: Source Security Gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run filesystem and secret scan
        uses: aquasecurity/trivy-action@v0.28.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true
