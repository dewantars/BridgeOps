apiVersion: v1
kind: ConfigMap
metadata:
  name: laravel-config
  labels:
    app: bridgeops
data:
  APP_NAME: "BridgeOps"
  APP_ENV: "production"
  APP_DEBUG: "false"
  APP_TIMEZONE: "Asia/Jakarta"
  APP_URL: "http://localhost"
  LOG_CHANNEL: "stack"
  LOG_LEVEL: "info"
  DB_CONNECTION: "pgsql"
  DB_HOST: "postgres-service"
  DB_PORT: "5432"
  DB_DATABASE: "bridgeops_ai"
  DB_USERNAME: "bridgeops_user"
  SESSION_DRIVER: "database"
  QUEUE_CONNECTION: "database"
  CACHE_STORE: "database"
