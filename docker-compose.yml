services:
  postgres:
    image: postgres:16
    container_name: bridgeops_postgres
    restart: always
    environment:
      POSTGRES_DB:
      POSTGRES_USER:
      POSTGRES_PASSWORD:
    ports:
      - "5432:5432"
    volumes:
      - bridgeops_postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: bridgeops_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL:
      PGADMIN_DEFAULT_PASSWORD:
    ports:
      - "5050:80"
    depends_on:
      - postgres

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bridgeops_app
    restart: always
    ports:
      - "8080:8080"
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_KEY:
      APP_URL:
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE:
      DB_USERNAME:
      DB_PASSWORD:
      QUEUE_CONNECTION: database
      SESSION_DRIVER: database
      CACHE_STORE: database
    depends_on:
      - postgres

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bridgeops_worker
    restart: always
    command: ["queue"]
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_KEY:
      APP_URL:
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE:
      DB_USERNAME:
      DB_PASSWORD:
      QUEUE_CONNECTION: database
      SESSION_DRIVER: database
      CACHE_STORE: database
    depends_on:
      - postgres
      - app

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bridgeops_scheduler
    restart: always
    command: ["scheduler"]
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_KEY:
      APP_URL:
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE:
      DB_USERNAME:
      DB_PASSWORD:
      QUEUE_CONNECTION: database
      SESSION_DRIVER: database
      CACHE_STORE: database
    depends_on:
      - postgres
      - app

volumes:
  bridgeops_postgres_data:
