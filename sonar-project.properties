# SonarCloud configuration
# https://sonarcloud.io — Set these values to match your SonarCloud project

sonar.projectKey=dewantars_BridgeOps
sonar.organization=dewantars

# Project metadata
sonar.projectName=BridgeOps
sonar.projectVersion=1.0

# Source directories
sonar.sources=app,resources/js,resources/css
sonar.tests=tests

# Exclusions — skip vendor, build artifacts, and node_modules
sonar.exclusions=vendor/**,node_modules/**,public/build/**,storage/**,bootstrap/cache/**

# PHP-specific settings
sonar.php.file.suffixes=.php
sonar.php.coverage.reportPaths=coverage.xml

# JavaScript/TypeScript
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Encoding
sonar.sourceEncoding=UTF-8
